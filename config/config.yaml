# ============================================================
# Search Keyword Performance Analyzer - Configuration
# ============================================================
# Update this file to change application behavior without
# modifying any Python code.
# ============================================================

# --- Search Engine Definitions ---
# Each entry maps an engine keyword (matched against referrer hostname)
# to the URL query parameter that holds the search keyword.
search_engines:
  google: "q"
  bing: "q"
  yahoo: "p"
  msn: "q"

# --- Event Codes ---
# Adobe Analytics event codes used to identify actions.
events:
  purchase: "1"
  product_view: "2"
  cart_open: "10"
  cart_checkout: "11"
  cart_add: "12"
  cart_remove: "13"
  cart_view: "14"

# --- Input File Settings ---
input:
  delimiter: "\t"
  encoding: "utf-8"
  # Column names in the hit-level data file
  columns:
    ip: "ip"
    referrer: "referrer"
    event_list: "event_list"
    product_list: "product_list"

# --- Product List Parsing ---
product_list:
  product_delimiter: ","
  field_delimiter: ";"
  # Zero-based index of the revenue field within a product entry
  # Format: Category;Name;Quantity;Revenue;CustomEvent
  revenue_field_index: 3

# --- Output Settings ---
output:
  directory: "output"
  filename_template: "{date}_SearchKeywordPerformance.tab"
  date_format: "%Y-%m-%d"
  delimiter: "\t"
  headers:
    - "Search Engine Domain"
    - "Search Keyword"
    - "Revenue"

# --- AWS Settings ---
aws:
  region: "us-east-1"
  s3:
    input_prefix: "input/"
    output_prefix: "output/"
